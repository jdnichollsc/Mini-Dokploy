# Nginx config used as a rewriting docker-socket proxy in dev mode.
# Mounted at /etc/nginx/nginx.conf in the nginx Swarm service.
#
# Problem this fixes:
#   Docker Engine 29.x dropped the legacy /v1.24/* API paths (MinAPIVersion=1.40)
#   but Traefik v3.x's compiled-in Go SDK still calls /v1.24/version, which gets
#   400 Bad Request. The DOCKER_API_VERSION env var is ignored by Traefik.
#   Workaround: rewrite the version prefix in front of the engine.

user root;
worker_processes 1;
events { worker_connections 1024; }

http {
  upstream docker {
    server unix:/var/run/docker.sock;
  }

  server {
    listen 2375 default_server;

    # Rewrite any old /v1.24/... or /v1.30/... path to /v1.40/... (the
    # minimum the new engine accepts).
    location ~ ^/v1\.(2[4-9]|3[0-9])(/.*)$ {
      rewrite ^/v1\.(2[4-9]|3[0-9])(/.*)$ /v1.40$2 break;
      proxy_pass http://docker;
      proxy_set_header Host $host;
      # Long Swarm event streams need a generous timeout.
      proxy_read_timeout 1h;
    }

    # Everything else passes through unmodified.
    location / {
      proxy_pass http://docker;
      proxy_set_header Host $host;
      proxy_read_timeout 1h;
    }
  }
}
